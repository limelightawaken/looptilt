services:
  postgres:
    image: postgres:16-alpine
    container_name: looptilt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: looptilt
      POSTGRES_PASSWORD: looptilt
      POSTGRES_DB: looptilt
    ports:
      - "5432:5432"
    volumes:
      - looptilt-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U looptilt -d looptilt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: looptilt-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - looptilt-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  looptilt-postgres-data:
  looptilt-redis-data: