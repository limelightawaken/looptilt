services:
  postgres:
    image: 'postgres:16-alpine'
    restart: unless-stopped
    healthcheck:
      test: 'pg_isready -U ${POSTGRES_USER:-looptilt} -d ${POSTGRES_DB:-looptilt}'
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: '${POSTGRES_PORT:-5432}'
      POSTGRES_PORT: '${POSTGRES_PORT:-5432}'
      POSTGRES_USER: '${POSTGRES_USER:-looptilt}'
      PGPASSWORD: '${SERVICE_PASSWORD_POSTGRES}'
      POSTGRES_PASSWORD: '${SERVICE_PASSWORD_POSTGRES}'
      PGDATABASE: '${POSTGRES_DB:-looptilt}'
      POSTGRES_DB: '${POSTGRES_DB:-looptilt}'
    volumes:
      - 'looptilt-postgres-data:/var/lib/postgresql/data'

  redis:
    image: 'redis:7-alpine'
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - 'looptilt-redis-data:/data'

  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM node:20-alpine AS builder
        WORKDIR /app
        COPY package*.json ./
        COPY nest-cli.json ./
        COPY tsconfig.json ./
        RUN npm ci
        COPY prisma ./prisma/
        RUN npx prisma generate
        COPY src ./src
        COPY scripts ./scripts/
        RUN npm run build
        RUN ls -la dist/ && test -f dist/main.js
        RUN chmod +x scripts/docker-entrypoint.sh
        FROM node:20-alpine AS production
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci --omit=dev && npm cache clean --force
        RUN npm install prisma@^6.0.0 --save-dev && npm cache clean --force
        COPY --from=builder /app/prisma ./prisma
        COPY --from=builder /app/node_modules/.prisma ./node_modules/.prisma
        COPY --from=builder /app/node_modules/@prisma ./node_modules/@prisma
        COPY --from=builder /app/dist ./dist
        COPY --from=builder /app/scripts/docker-entrypoint.sh ./scripts/docker-entrypoint.sh
        RUN ls -la dist/ && test -f dist/main.js
        RUN addgroup -g 1001 -S nodejs && adduser -S nestjs -u 1001
        RUN chown -R nestjs:nodejs /app
        USER nestjs
        EXPOSE 3001
        CMD ["sh", "scripts/docker-entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Coolify Traefik routing (service name + port)
      SERVICE_URL_BACKEND_3001: ''
      HOSTNAME: '0.0.0.0'
      NODE_ENV: production
      PORT: '3001'
      API_PREFIX: '${API_PREFIX}'
      # URLs — same structure as local .env (entrypoint fills fallbacks)
      BACKEND_URL: '${BACKEND_URL}'
      FRONTEND_URL: '${FRONTEND_URL}'
      SERVICE_URL_BACKEND: '${SERVICE_URL_BACKEND}'
      SERVICE_URL_FRONTEND: '${SERVICE_URL_FRONTEND}'
      # Postgres — entrypoint builds URL-safe DATABASE_URL
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${SERVICE_PASSWORD_POSTGRES}'
      POSTGRES_HOST: '${POSTGRES_HOSTNAME}'
      POSTGRES_PORT: '${POSTGRES_PORT}'
      POSTGRES_DB: '${POSTGRES_DB}'
      # Redis
      REDIS_HOST: '${REDIS_HOSTNAME}'
      REDIS_PORT: '${REDIS_PORT}'
      REDIS_PASSWORD: '${REDIS_PASSWORD}'
      # Auth / crypto
      BETTER_AUTH_SECRET: '${SERVICE_PASSWORD_BETTERAUTH}'
      ENCRYPTION_KEY: '${SERVICE_PASSWORD_ENCRYPTION}'
      # AI
      ENABLE_SIMULATOR: 'false'
      ALLOW_HEURISTIC_FALLBACK: '${ALLOW_HEURISTIC_FALLBACK}'
      OPENAI_API_KEY: '${OPENAI_API_KEY}'
      OPENAI_BASE_URL: '${OPENAI_BASE_URL}'
      OPENAI_MODEL: '${OPENAI_MODEL}'
      # Storage
      AWS_REGION: '${AWS_REGION}'
      AWS_ACCESS_KEY_ID: '${AWS_ACCESS_KEY_ID}'
      AWS_SECRET_ACCESS_KEY: '${AWS_SECRET_ACCESS_KEY}'
      AWS_S3_BUCKET: '${AWS_S3_BUCKET}'
      # Email
      EMAIL_PROVIDER: '${EMAIL_PROVIDER}'
      UNOSEND_API_KEY: '${UNOSEND_API_KEY}'
      UNOSEND_BASE_URL: '${UNOSEND_BASE_URL}'
      RESEND_API_KEY: '${RESEND_API_KEY}'
      RESEND_API_URL: '${RESEND_API_URL}'
      SMTP_HOST: '${SMTP_HOST}'
      SMTP_PORT: '${SMTP_PORT}'
      SMTP_USER: '${SMTP_USER}'
      SMTP_PASS: '${SMTP_PASS}'
      SMTP_FROM: '${SMTP_FROM}'
      REQUIRE_EMAIL_VERIFICATION: '${REQUIRE_EMAIL_VERIFICATION}'
      # Kit ESP
      KIT_API_BASE_URL: '${KIT_API_BASE_URL}'
      KIT_OAUTH_CLIENT_ID: '${KIT_OAUTH_CLIENT_ID}'
      KIT_OAUTH_CLIENT_SECRET: '${KIT_OAUTH_CLIENT_SECRET}'
      KIT_OAUTH_REDIRECT_URI: '${KIT_OAUTH_REDIRECT_URI}'
      KIT_OAUTH_AUTHORIZE_URL: '${KIT_OAUTH_AUTHORIZE_URL}'
      KIT_OAUTH_TOKEN_URL: '${KIT_OAUTH_TOKEN_URL}'
      KIT_OAUTH_SCOPE: '${KIT_OAUTH_SCOPE}'
      KIT_WEBHOOK_SECRET: '${KIT_WEBHOOK_SECRET}'

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM node:20-alpine AS builder
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci
        COPY . .
        ARG NEXT_PUBLIC_BACKEND_URL
        ENV NEXT_PUBLIC_BACKEND_URL=$$NEXT_PUBLIC_BACKEND_URL
        RUN npm run build
        FROM node:20-alpine AS production
        WORKDIR /app
        ENV NODE_ENV=production
        ENV PORT=3000
        ENV HOSTNAME=0.0.0.0
        RUN addgroup -g 1001 -S nodejs && adduser -S nextjs -u 1001
        COPY --from=builder /app/public ./public
        COPY --from=builder --chown=nextjs:nodejs /app/.next/standalone ./
        COPY --from=builder --chown=nextjs:nodejs /app/.next/static ./.next/static
        USER nextjs
        EXPOSE 3000
        CMD ["node", "server.js"]
      args:
        NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      start_period: 60s
      timeout: 10s
      interval: 10s
      retries: 6
    environment:
      SERVICE_URL_FRONTEND_3000: ''
      HOSTNAME: '0.0.0.0'
      NODE_ENV: production
      PORT: '3000'
      BACKEND_URL: '${BACKEND_URL}'
      FRONTEND_URL: '${FRONTEND_URL}'

volumes:
  looptilt-postgres-data:
  looptilt-redis-data:
